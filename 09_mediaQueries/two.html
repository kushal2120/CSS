<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    .container {
      border: 2px solid black;
      background-color: beige;
      display: flex;
      flex-direction: row;
      width: 450px;
      margin: 3px;
      padding: 2px;
    }

    #box-left {
      background-color:aquamarine;
      border: 1px solid brown;
      width: 47%;
      margin: 3px;
      padding: 2px;
      display: flex;
      flex-direction: column;
    }

    #box-right {
      background-color: yellow;
      border: 1px solid blue;
      width: 47%;
      margin: 3px;
      padding: 2px;
    }

    p{
      border: 1px solid red;
    }

    img{
      width: 200px;
    }

    @media (max-width: 640px) {
      .container {
        flex-direction: column;
      }
    }
    
  </style>
</head>
<body>
  
  <div class="container">
    <div id="box-left">
      <p>text1</p>
      <p>text2</p>
    </div>
    <div id="box-right">
      <img src="images1.jpg" alt="">
    </div>
  </div>
</body>
</html>
